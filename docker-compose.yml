version: '3.9'

services:
  agentflyer:
    image: agentflyer/agentflyer:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflyer
    restart: unless-stopped
    ports:
      - '${GATEWAY_PORT:-19789}:19789'
    volumes:
      - agentflyer_data:/data
      # Optionally bind-mount your local config:
      # - ./agentflyer.json:/data/agentflyer.json:ro
    environment:
      AGENTFLYER_DATA_DIR: /data
      # Set your API keys via environment:
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:19789/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  agentflyer_data:
    driver: local

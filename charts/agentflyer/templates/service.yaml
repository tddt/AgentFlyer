apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentflyer.fullname" . }}
  labels:
    {{- include "agentflyer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 19789
      protocol: TCP
      name: gateway
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
